name: Run Script on PR

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run MiAction
      uses: ./.github/actions/files
      with:
        file: 'file1.txt .github/workflows/bwcpipeline.yml' 
  
  use-secrets:
    environment: prod
    env:
      user: ${{ vars.DEPLOYMENT_USER }}
      password: ${{ secrets.DEPLOYMENT_PASSWORD }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use secrets in script
      run: |
        echo "Using secrets in the script"
        echo "USER: ${{ env.user }}"
        echo "PASSWORD: ${{ env.password }}"
    - name: Create summary table
      run: |
        echo "| Step | Status | Duration |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|----------|" >> $GITHUB_STEP_SUMMARY
        echo "| Checkout | Success | 5s |" >> $GITHUB_STEP_SUMMARY
        echo "| Build    | Success | 45s |" >> $GITHUB_STEP_SUMMARY
        echo "| Tests    | Failed  | 12s |" >> $GITHUB_STEP_SUMMARY