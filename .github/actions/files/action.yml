name: 'Cat Files Action'
description: 'Displays the contents of a file or all files in the current directory'

inputs:
  file:
    description: 'Optional file to display'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Cat file(s)
      shell: bash
      run: |
        if [ -n "${{ inputs.file }}" ]; then
          read -r -a files <<< "${{ inputs.file }}"
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "=== Contents of $file ==="
              cat "$file"
              echo ""
            else
              echo "File '$file' not found" >&2
              exit 1
            fi
          done
        else
          for file in *; do
            if [ -f "$file" ]; then
              echo "=== Contents of $file ==="
              cat "$file"
              echo ""
            fi
          done
        fi