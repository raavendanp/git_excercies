name: 'Cat Files Action'
description: 'Displays the contents of all files in the current directory'

runs:
  using: 'composite'
  steps:
    - name: Cat all files
      run: |
        for file in *; do
          if [ -f "$file" ]; then
            echo "=== Contents of $file ==="
            cat "$file"
            echo ""
          fi
        done
      shell: bash